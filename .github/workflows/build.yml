name: Build App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 3️⃣ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    # 4️⃣ Build app
    - name: Build application
      run: |
        pyinstaller \
        --noconfirm \
        --windowed \
        --name SecurePasswordGenerator \
        --paths=. \
        --paths=./password_generator \
        app/main.py

    # 5️⃣ Upload artifacts
    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: SecurePasswordGenerator-${{ matrix.os }}
        path: dist/