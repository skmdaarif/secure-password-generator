name: Build App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 3️⃣ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    # 🔥 LINUX BUILD
    - name: Build (Linux)
      if: runner.os == 'Linux'
      run: |
        pyinstaller \
        --noconfirm \
        --windowed \
        --name SecurePasswordGenerator \
        --icon=app/assets/passwd-icon.png \
        --paths=. \
        --hidden-import=password_generator \
        --hidden-import=password_generator.core \
        app/main.py

    # 🔥 macOS BUILD (Intel compatible)
    - name: Build (macOS)
      if: runner.os == 'macOS'
      run: |
        arch -x86_64 pyinstaller \
        --noconfirm \
        --windowed \
        --name SecurePasswordGenerator \
        --icon=app/assets/icon.icns \
        --paths=. \
        --hidden-import=password_generator \
        --hidden-import=password_generator.core \
        app/main.py

    # 🔥 WINDOWS BUILD
    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller ^
        --noconfirm ^
        --windowed ^
        --name SecurePasswordGenerator ^
        --icon=app/assets/passwd-icon.ico ^
        --paths=. ^
        --hidden-import=password_generator ^
        --hidden-import=password_generator.core ^
        app/main.py
      shell: cmd

    # 📦 Upload artifacts (clean naming)
    - name: Upload macOS app
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: SecurePasswordGenerator-macos
        path: dist/SecurePasswordGenerator.app

    - name: Upload Windows exe
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: SecurePasswordGenerator-windows
        path: dist/SecurePasswordGenerator

    - name: Upload Linux binary
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: SecurePasswordGenerator-linux
        path: dist/SecurePasswordGenerator