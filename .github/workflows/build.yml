name: Build App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 3️⃣ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    # 🔥 LINUX BUILD
    - name: Build (Linux)
      if: runner.os == 'Linux'
      run: |
        pyinstaller \
        --noconfirm \
        --windowed \
        --name SecurePasswordGenerator \
        --paths=. \
        --hidden-import=password_generator \
        --hidden-import=password_generator.core \
        app/main.py

    # 🔥 macOS BUILD (FORCE INTEL x86_64)
    - name: Build (macOS)
      if: runner.os == 'macOS'
      run: |
        arch -x86_64 pyinstaller \
        --noconfirm \
        --windowed \
        --name SecurePasswordGenerator \
        --paths=. \
        --hidden-import=password_generator \
        --hidden-import=password_generator.core \
        app/main.py

    # 🔥 WINDOWS BUILD
    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller ^
        --noconfirm ^
        --windowed ^
        --name SecurePasswordGenerator ^
        --paths=. ^
        --hidden-import=password_generator ^
        --hidden-import=password_generator.core ^
        app/main.py
      shell: cmd

    # 📦 Upload artifacts
    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: SecurePasswordGenerator-${{ matrix.os }}
        path: dist/