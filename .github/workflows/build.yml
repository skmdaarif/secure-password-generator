name: Build App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    # 🔥 IMPORTANT FIX HERE
    - name: Build application
      run: |
        pyinstaller ^
        --noconfirm ^
        --windowed ^
        --name SecurePasswordGenerator ^
        --paths=. ^
        --hidden-import=password_generator ^
        --hidden-import=password_generator.core ^
        app/main.py
      shell: cmd

    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: SecurePasswordGenerator-${{ matrix.os }}
        path: dist/