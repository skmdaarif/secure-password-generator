name: Build App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install pyinstaller

    - name: Build app
      run: |
        pyinstaller --name SecurePasswordGenerator \
        --windowed \
        --paths=. \
        app/main.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SecurePasswordGenerator-${{ matrix.os }}
        path: dist/